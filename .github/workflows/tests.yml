name: tests

on:
  push:
  pull_request:

jobs:
  bun-and-paperqa-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Sync PaperQA+ACE environment with uv
        run: |
          uv venv packages/server-paperqa/.venv-paperqa
          VIRTUAL_ENV=packages/server-paperqa/.venv-paperqa uv sync --active --no-default-groups --group paperqa --group ace --group test

      - name: Verify Scrapling dependency in PaperQA venv
        run: |
          packages/server-paperqa/.venv-paperqa/bin/python -c "import scrapling; print(scrapling.__version__)"

      - name: Run Bun tests
        run: bun test --recursive

      - name: Run Python tests
        run: packages/server-paperqa/.venv-paperqa/bin/python -m pytest packages/server-paperqa/src/__tests__/test_paperqa_server.py
